name: VFS Contract Gates

on:
  pull_request:
    paths:
      - 'ipfs_kit_py/ipfs_fsspec.py'
      - 'ipfs_kit_py/ipfs_datasets_integration.py'
      - 'ipfs_kit_py/mcp/servers/**'
      - 'tests/test_vfs_contract_hardening.py'
      - 'tests/test_datasets_metadata_index_contract.py'
      - 'tests/test_mcp_vfs_adapter_contract.py'
      - 'tests/test_vfs_jsonrpc.py'
      - 'tests/test_vfs_mcp_tools.py'
      - 'docs/VFS_CONTRACT_SPEC.md'
      - '.github/workflows/vfs-contract-gates.yml'
  push:
    branches: [ main ]
    paths:
      - 'ipfs_kit_py/ipfs_fsspec.py'
      - 'ipfs_kit_py/ipfs_datasets_integration.py'
      - 'ipfs_kit_py/mcp/servers/**'
      - 'tests/test_vfs_contract_hardening.py'
      - 'tests/test_datasets_metadata_index_contract.py'
      - 'tests/test_mcp_vfs_adapter_contract.py'
      - 'tests/test_vfs_jsonrpc.py'
      - 'tests/test_vfs_mcp_tools.py'
      - 'docs/VFS_CONTRACT_SPEC.md'
      - '.github/workflows/vfs-contract-gates.yml'

jobs:
  contract-gates:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install test deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run VFS contract hardening suite
        run: pytest tests/test_vfs_contract_hardening.py -q

      - name: Run datasets metadata index contract suite
        run: pytest tests/test_datasets_metadata_index_contract.py -q

      - name: Run MCP VFS adapter contract suite
        run: pytest tests/test_mcp_vfs_adapter_contract.py -q

      - name: Run JSON-RPC and MCP tool suites
        run: pytest tests/test_vfs_jsonrpc.py tests/test_vfs_mcp_tools.py -q
